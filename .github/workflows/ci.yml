name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore backend
        working-directory: backend
        run: dotnet restore AestheticTechStore.sln

      - name: Build backend
        working-directory: backend
        run: dotnet build AestheticTechStore.sln --configuration Release --no-restore

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:5171
        run: npm run build

  docker:
    name: Docker Compose Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production images
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=postgres;Username=postgres;Password=password;SSL Mode=Require;Trust Server Certificate=true
          Jwt__Key: ci-placeholder-secret-for-build-only
          BACKEND_URL: http://backend:8080
        run: docker compose -f docker-compose.prod.yml build